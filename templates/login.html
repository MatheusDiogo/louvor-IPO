{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <title>Login | Louvor IPO</title>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>LOUVOR <span style="font-weight: 300; color: #1a2e1a;">IPO</span></h2>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="input-group-modern">
                    <i class="bi bi-person text-muted"></i>
                    <input type="text" name="username" placeholder="Usuário" required>
                </div>
                
                <div class="input-group-modern">
                    <i class="bi bi-lock text-muted"></i>
                    <input type="password" name="password" id="password" placeholder="Senha" required>
                    <i class="bi bi-eye toggle-password" onclick="togglePassword()" style="cursor: pointer;"></i>
                </div>

                {% if erro %}
                <div class="login-error">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span>Usuário ou senha incorretos</span>
                </div>
                {% endif %}

                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>
    </div>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
