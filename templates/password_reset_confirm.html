{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <title>Nova Senha | Louvor IPO</title>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>LOUVOR <span style="font-weight: 300; color: #1a2e1a;">IPO</span></h2>
                <p style="font-size: 0.85rem; color: #666; margin-top: 4px;">Criar nova senha</p>
            </div>
            {% if validlink %}
            <form method="post">
                {% csrf_token %}
                <div class="input-group-modern">
                    <i class="bi bi-lock text-muted"></i>
                    <input type="password" name="new_password1" placeholder="Nova senha" required>
                </div>
                <div class="input-group-modern">
                    <i class="bi bi-lock-fill text-muted"></i>
                    <input type="password" name="new_password2" placeholder="Confirmar senha" required>
                </div>
                {% if form.errors %}
                <div class="login-error">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span>{{ form.errors.new_password2|striptags }}</span>
                </div>
                {% endif %}
                <button type="submit" class="btn-login">Salvar nova senha</button>
            </form>
            {% else %}
            <div style="text-align: center; padding: 16px 0; color: #c0392b;">
                <i class="bi bi-x-circle" style="font-size: 2rem;"></i>
                <p>Link inválido ou expirado.</p>
                <a href="{% url 'password_reset' %}" class="btn-login" style="display:block; text-align:center; text-decoration:none; margin-top:12px;">Solicitar novo link</a>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
