{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Recuperar Senha | Louvor IPO</title>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>LOUVOR <span style="font-weight: 300; color: #1a2e1a;">IPO</span></h2>
                <p style="font-size: 0.85rem; color: #666; margin-top: 4px;">Recuperação de senha</p>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="input-group-modern">
                    <i class="bi bi-envelope text-muted"></i>
                    <input type="email" name="email" placeholder="Seu e-mail" required>
                </div>
                <button type="submit" class="btn-login">Enviar link</button>
            </form>
            <div style="text-align: center; margin-top: 16px;">
                <a href="{% url 'login' %}" style="font-size: 0.85rem; color: #555;">Voltar ao login</a>
            </div>
        </div>
    </div>
</body>
</html>
