{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Louvor IPO</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-verde shadow-sm py-3">
    <div class="container">
        <a class="navbar-brand fw-bolder d-flex align-items-center" href="/home">
            <span style="color: var(--primary-green)">LOUVOR</span>
            <span class="ms-1 fw-light text-dark">IPO</span>
        </a>

        {% if user.is_authenticated %}
        <div class="d-flex align-items-center">
            <span class="text-muted me-3 small">
                <i class="bi bi-person-circle me-1"></i> {{ user.username }}
            </span>
            <a href="/logout/" class="btn btn-sm btn-light border">Sair</a>
        </div>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">

{% block content %}
{% endblock %}

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
