{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>E-mail Enviado | Louvor IPO</title>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>LOUVOR <span style="font-weight: 300; color: #1a2e1a;">IPO</span></h2>
            </div>
            <div style="text-align: center; padding: 16px 0;">
                <i class="bi bi-envelope-check" style="font-size: 2.5rem; color: #2d5a27;"></i>
                <p style="margin-top: 12px; color: #444;">Se este e-mail estiver cadastrado, você receberá um link em instantes.</p>
            </div>
            <a href="{% url 'login' %}" class="btn-login" style="display: block; text-align: center; text-decoration: none;">Voltar ao login</a>
        </div>
    </div>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</body>
</html>
